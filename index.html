<script>
const allQuestions = [
{
    question: "หน่วยพื้นฐานของสิ่งมีชีวิตคืออะไร?",
    answers: ["เซลล์", "เนื้อเยื่อ", "อวัยวะ", "DNA"],
    correct: 0
},
{
    question: "พืชสร้างอาหารด้วยกระบวนการใด?",
    answers: ["การหายใจ", "การย่อยอาหาร", "การสังเคราะห์แสง", "การสืบพันธุ์"],
    correct: 2
},
{
    question: "DNA ย่อมาจากอะไร?",
    answers: [
        "Deoxyribonucleic Acid",
        "Dynamic Nucleus Acid",
        "Double Nature Acid",
        "Digital Network Array"
    ],
    correct: 0
},
{
    question: "สัตว์เลี้ยงลูกด้วยนมมีลักษณะเด่นคืออะไร?",
    answers: ["มีเกล็ด", "มีขนและต่อมน้ำนม", "มีเหงือก", "มีเปลือกแข็ง"],
    correct: 1
},
{
    question: "อวัยวะใดสูบฉีดเลือด?",
    answers: ["ปอด", "หัวใจ", "ตับ", "ไต"],
    correct: 1
},
{
    question: "เม็ดเลือดแดงทำหน้าที่อะไร?",
    answers: ["สร้างฮอร์โมน", "ลำเลียงออกซิเจน", "ย่อยอาหาร", "สร้างภูมิคุ้มกัน"],
    correct: 1
},
{
    question: "พืชดูดน้ำผ่านส่วนใด?",
    answers: ["ใบ", "ลำต้น", "ราก", "ดอก"],
    correct: 2
},
{
    question: "หน่วยพันธุกรรมเรียกว่าอะไร?",
    answers: ["ยีน", "โปรตีน", "ฮอร์โมน", "เอนไซม์"],
    correct: 0
},
{
    question: "สิ่งมีชีวิตใดเป็นผู้ผลิต?",
    answers: ["เห็ด", "สาหร่าย", "เสือ", "มนุษย์"],
    correct: 1
},
{
    question: "กระดูกมนุษย์ผู้ใหญ่มีประมาณกี่ชิ้น?",
    answers: ["106", "206", "306", "406"],
    correct: 1
},
{
    question: "ส่วนใดของเซลล์ควบคุมการทำงาน?",
    answers: ["นิวเคลียส", "เยื่อหุ้มเซลล์", "ไซโทพลาซึม", "ไรโบโซม"],
    correct: 0
},
{
    question: "วิตามินที่ช่วยป้องกันโรคลักปิดลักเปิดคือ?",
    answers: ["A", "B", "C", "D"],
    correct: 2
},
{
    question: "การแบ่งเซลล์เพื่อเจริญเติบโตเรียกว่า?",
    answers: ["ไมโอซิส", "ไมโทซิส", "ฟิชชัน", "บัดดิ้ง"],
    correct: 1
},
{
    question: "สัตว์ชนิดใดมีกระดูกสันหลัง?",
    answers: ["แมงมุม", "ปลาดาว", "งู", "แมงกะพรุน"],
    correct: 2
},
{
    question: "ปอดทำหน้าที่อะไร?",
    answers: ["สูบฉีดเลือด", "แลกเปลี่ยนแก๊ส", "สร้างเม็ดเลือด", "ย่อยอาหาร"],
    correct: 1
}
];

let questions = [];
let current = 0;
let score = 0;

function startGame() {
    questions = [...allQuestions]
        .sort(() => Math.random() - 0.5)
        .slice(0, 10);

    current = 0;
    score = 0;

    document.getElementById("result").innerHTML = "";
    loadQuestion();
}

function loadQuestion() {
    const q = questions[current];

    document.getElementById("question").innerHTML =
        `ข้อ ${current + 1}/10<br>${q.question}`;

    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.answers.forEach((answer, index) => {
        const btn = document.createElement("button");
        btn.textContent = answer;
        btn.onclick = () => checkAnswer(index);
        answersDiv.appendChild(btn);
    });
}

function checkAnswer(selected) {
    if (selected === questions[current].correct) {
        score++;
    }

    current++;

    if (current < 10) {
        loadQuestion();
    } else {
        document.getElementById("question").innerHTML = "🎉 จบเกม";
        document.getElementById("answers").innerHTML =
            `<button onclick="startGame()">🔄 เล่นใหม่</button>`;

        document.getElementById("result").innerHTML =
            `คะแนน ${score}/10`;
    }
}

window.onload = startGame;
</script>
