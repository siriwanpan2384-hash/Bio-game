<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>เกมชีววิทยา ม.5</title>

<style>
body{
    font-family:Tahoma,sans-serif;
    background:#e8f5e9;
    margin:0;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    color:#2e7d32;
}

button{
    width:100%;
    padding:12px;
    margin:5px 0;
    border:none;
    border-radius:8px;
    background:#4caf50;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#388e3c;
}

#question{
    font-size:20px;
    margin:20px 0;
}

.info{
    margin-bottom:15px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<h1>🧬 เกมชีววิทยา</h1>

<div id="menu">

<h3>เลือกหมวดหมู่</h3>

<select id="category">
<option value="reproduction">การสืบพันธุ์ของพืชดอก</option>
<option value="growth">โครงสร้างและการเจริญเติบโตของพืชดอก</option>
<option value="chromosome">โครโมโซมและสารพันธุกรรม</option>
<option value="genetics">การถ่ายทอดลักษณะทางพันธุกรรม</option>
</select>

<h3>เลือกระดับ</h3>

<select id="level">
<option value="easy">ง่าย</option>
<option value="medium">ปานกลาง</option>
<option value="hard">ยาก</option>
<option value="veryhard">ยากมาก</option>
</select>

<button onclick="startGame()">เริ่มเกม</button>

</div>

<div id="game" style="display:none;">

<div class="info" id="progress"></div>
<div class="info" id="score"></div>

<div id="question"></div>

<div id="answers"></div>

</div>

</div>

<script>

const questions = [

{
category:"reproduction",
level:"easy",
question:"ส่วนใดของดอกทำหน้าที่สร้างเซลล์สืบพันธุ์เพศผู้",
answers:["อับเรณู","รังไข่","กลีบดอก","ฐานรองดอก"],
correct:"อับเรณู"
},

{
category:"reproduction",
level:"medium",
question:"ละอองเรณูตกบนยอดเกสรเพศเมียเรียกว่าอะไร",
answers:["การปฏิสนธิ","การถ่ายเรณู","ไมโอซิส","การงอก"],
correct:"การถ่ายเรณู"
},

{
category:"growth",
level:"easy",
question:"ส่วนใดของพืชทำหน้าที่ดูดน้ำ",
answers:["ราก","ลำต้น","ใบ","ดอก"],
correct:"ราก"
},

{
category:"growth",
level:"hard",
question:"เนื้อเยื่อเจริญที่ปลายรากเรียกว่า",
answers:[
"Apical Meristem",
"Lateral Meristem",
"Cambium",
"Phloem"
],
correct:"Apical Meristem"
},

{
category:"chromosome",
level:"easy",
question:"DNA อยู่ที่ใดของเซลล์",
answers:[
"นิวเคลียส",
"ไรโบโซม",
"ไมโทคอนเดรีย",
"กอลจิ"
],
correct:"นิวเคลียส"
},

{
category:"chromosome",
level:"veryhard",
question:"DNA ประกอบด้วยสายพอลินิวคลีโอไทด์กี่สาย",
answers:["1","2","3","4"],
correct:"2"
},

{
category:"genetics",
level:"easy",
question:"เมนเดลได้รับการยกย่องว่าเป็นบิดาแห่งวิชาพันธุศาสตร์",
answers:["ถูก","ผิด"],
correct:"ถูก"
},

{
category:"genetics",
level:"medium",
question:"ลักษณะที่ปรากฏออกมาจริงเรียกว่า",
answers:[
"Genotype",
"Phenotype",
"Allele",
"Locus"
],
correct:"Phenotype"
},

{
category:"genetics",
level:"hard",
question:"Tt × Tt มีโอกาสได้ tt เท่าใด",
answers:[
"25%",
"50%",
"75%",
"100%"
],
correct:"25%"
},

{
category:"genetics",
level:"veryhard",
question:"กฎการแยกตัวของยีนถูกเสนอโดยใคร",
answers:[
"Darwin",
"Mendel",
"Watson",
"Crick"
],
correct:"Mendel"
}

];

let currentQuestions=[];
let current=0;
let score=0;

function shuffle(arr){
return arr.sort(()=>Math.random()-0.5);
}

function startGame(){

const category =
document.getElementById("category").value;

const level =
document.getElementById("level").value;

currentQuestions =
questions.filter(q =>
q.category===category &&
q.level===level
);

currentQuestions =
shuffle([...currentQuestions]);

while(currentQuestions.length < 10){

let extra =
shuffle(
questions.filter(q =>
q.category===category
)
);

currentQuestions.push(...extra);

}

currentQuestions =
currentQuestions.slice(0,10);

score=0;
current=0;

document.getElementById("menu").style.display="none";
document.getElementById("game").style.display="block";

showQuestion();

}

function showQuestion(){

let q=currentQuestions[current];

document.getElementById("progress").innerHTML =
"ข้อ "+(current+1)+" / 10";

document.getElementById("score").innerHTML =
"คะแนน : "+score;

document.getElementById("question").innerHTML =
q.question;

let choices = shuffle([...q.answers]);

let html="";

choices.forEach(choice=>{

html += `
<button onclick="checkAnswer('${choice}')">
${choice}
</button>
`;

});

document.getElementById("answers").innerHTML =
html;

}

function checkAnswer(answer){

if(answer===currentQuestions[current].correct){
score++;
}

current++;

if(current<10){
showQuestion();
}
else{

document.getElementById("question").innerHTML=
`🎉 จบเกม<br><br>ได้คะแนน ${score}/10`;

document.getElementById("answers").innerHTML=
`
<button onclick="location.reload()">
เล่นใหม่
</button>
`;

document.getElementById("progress").innerHTML="";
document.getElementById("score").innerHTML="";

}

}

</script>

</body>
</html>
