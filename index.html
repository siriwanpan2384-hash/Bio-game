<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Biology Quiz Game</title>

<style>
body{
    font-family:Tahoma,sans-serif;
    background:#e8f5e9;
    margin:0;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#2e7d32;
}

label{
    font-weight:bold;
}

select,button{
    width:100%;
    padding:12px;
    margin-top:8px;
    margin-bottom:15px;
    border-radius:8px;
}

button{
    border:none;
    background:#43a047;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#2e7d32;
}

.answer{
    margin-top:10px;
}

.info{
    font-weight:bold;
    margin-bottom:10px;
}

#question{
    font-size:22px;
    margin:20px 0;
}
</style>

</head>
<body>

<div class="container">

<h1>🧬 เกมชีววิทยา</h1>

<div id="menu">

<label>เลือกระดับ</label> <select id="level">

<option value="easy">ง่าย</option>
<option value="medium">ปานกลาง</option>
<option value="hard">ยาก</option>
<option value="veryhard">ยากมาก</option>
</select>

<label>เลือกหมวดหมู่</label> <select id="category">

<option value="flower">1. การสืบพันธุ์ของพืชดอก</option>
<option value="growth">2. โครงสร้างและการเจริญเติบโตของพืชดอก</option>
<option value="chromosome">3. โครโมโซมและสารพันธุกรรม</option>
<option value="genetic">4. การถ่ายทอดลักษณะทางพันธุกรรม</option>
</select>

<button onclick="startGame()">
เริ่มเกม
</button>

</div>

<div id="game" style="display:none">

<div class="info" id="score"></div>
<div class="info" id="progress"></div>

<div id="question"></div>

<div id="answers"></div>

</div>

</div>

<script>

/* ========= ฐานข้อมูลคำถาม ========= */

const questions = [

{
category:"flower",
level:"easy",
question:"เกสรตัวผู้สร้างอะไร",
answers:["ละอองเรณู","เมล็ด","ผล","ออวุล"],
correct:"ละอองเรณู"
},
{
category:"flower",
level:"easy",
question:"ส่วนใดเป็นอวัยวะสืบพันธุ์ของพืชดอก",
answers:["ดอก","ใบ","ราก","ลำต้น"],
correct:"ดอก"
},
{
category:"flower",
level:"medium",
question:"การถ่ายละอองเรณูเรียกว่า",
answers:["Pollination","Mitosis","Mutation","Growth"],
correct:"Pollination"
},
{
category:"growth",
level:"easy",
question:"รากทำหน้าที่อะไร",
answers:["ดูดน้ำ","สร้างเมล็ด","สืบพันธุ์","สร้างดอก"],
correct:"ดูดน้ำ"
},
{
category:"growth",
level:"medium",
question:"ไซเล็มทำหน้าที่",
answers:["ลำเลียงน้ำ","ลำเลียงอาหาร","เก็บอาหาร","สังเคราะห์โปรตีน"],
correct:"ลำเลียงน้ำ"
},
{
category:"growth",
level:"hard",
question:"ฮอร์โมนที่กระตุ้นการยืดตัวของเซลล์",
answers:["Auxin","ABA","Ethylene","GA ต่ำ"],
correct:"Auxin"
},
{
category:"chromosome",
level:"easy",
question:"DNA อยู่ในส่วนใดของเซลล์",
answers:["นิวเคลียส","ไรโบโซม","กอลจิ","แวคิวโอล"],
correct:"นิวเคลียส"
},
{
category:"chromosome",
level:"medium",
question:"DNA ย่อมาจากอะไร",
answers:[
"Deoxyribonucleic Acid",
"Double Acid",
"Dynamic Acid",
"Dual RNA"
],
correct:"Deoxyribonucleic Acid"
},
{
category:"chromosome",
level:"hard",
question:"มนุษย์มีโครโมโซมกี่คู่",
answers:["23","22","24","46"],
correct:"23"
},
{
category:"chromosome",
level:"veryhard",
question:"DNA จำลองตัวในระยะใด",
answers:["Interphase","Prophase","Metaphase","Anaphase"],
correct:"Interphase"
},
{
category:"genetic",
level:"easy",
question:"เมนเดลศึกษาพืชชนิดใด",
answers:["ถั่วลันเตา","ข้าว","ข้าวโพด","ถั่วเหลือง"],
correct:"ถั่วลันเตา"
},
{
category:"genetic",
level:"medium",
question:"TT เรียกว่า",
answers:[
"Homozygous",
"Heterozygous",
"Phenotype",
"Allele"
],
correct:"Homozygous"
},
{
category:"genetic",
level:"hard",
question:"Tt × Tt ได้ tt เท่าใด",
answers:["25%","50%","75%","100%"],
correct:"25%"
},
{
category:"genetic",
level:"veryhard",
question:"กฎการแยกตัวของยีนเสนอโดยใคร",
answers:[
"Mendel",
"Darwin",
"Watson",
"Crick"
],
correct:"Mendel"
}

];

/* =============================== */

let quiz = [];
let current = 0;
let score = 0;

function shuffle(array){

for(let i=array.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1));

[array[i],array[j]]=[array[j],array[i]];

}

return array;
}

function startGame(){

const level =
document.getElementById("level").value;

const category =
document.getElementById("category").value;

let pool =
questions.filter(q =>
q.level===level &&
q.category===category
);

if(pool.length===0){

alert("ยังไม่มีคำถามระดับนี้");

return;
}

quiz = shuffle([...pool]);

if(quiz.length > 10){
quiz = quiz.slice(0,10);
}

current = 0;
score = 0;

document.getElementById("menu").style.display="none";
document.getElementById("game").style.display="block";

showQuestion();
}

function showQuestion(){

const q = quiz[current];

document.getElementById("score").innerHTML =
"คะแนน : " + score;

document.getElementById("progress").innerHTML =
"ข้อ " + (current+1) + " / " + quiz.length;

document.getElementById("question").innerHTML =
q.question;

let answers =
shuffle([...q.answers]);

let html = "";

answers.forEach(ans=>{

html += `
<button class="answer"
onclick="checkAnswer('${ans}')">
${ans}
</button>
`;

});

document.getElementById("answers").innerHTML =
html;
}

function checkAnswer(answer){

if(answer===quiz[current].correct){
score++;
}

current++;

if(current < quiz.length){
showQuestion();
}
else{
finishGame();
}

}

function finishGame(){

let percent =
Math.round(score/quiz.length*100);

document.getElementById("question").innerHTML =

`
<h2>🎉 จบเกม</h2>
<p>คะแนน ${score}/${quiz.length}</p>
<p>${percent}%</p>
`;

document.getElementById("answers").innerHTML =

`
<button onclick="restartGame()">
🔄 เล่นใหม่
</button>
`;

document.getElementById("score").innerHTML="";
document.getElementById("progress").innerHTML="";
}

function restartGame(){

document.getElementById("menu").style.display="block";
document.getElementById("game").style.display="none";

}
</script>

</body>
</html>
