<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧬 Biology Quiz Game</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:linear-gradient(135deg,#6c63ff,#4caf50);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
background:white;
width:100%;
max-width:700px;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
text-align:center;
color:#6c63ff;
margin-bottom:20px;
}

select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#6c63ff;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#574bdb;
}

.option{
background:#f5f5f5;
padding:12px;
margin:10px 0;
border-radius:10px;
cursor:pointer;
}

.option:hover{
background:#dfe6ff;
}

.correct{
background:#b8ffb8 !important;
}

.wrong{
background:#ffb8b8 !important;
}

.hidden{
display:none;
}

#progress{
margin-bottom:15px;
font-weight:bold;
}

#score{
font-size:22px;
text-align:center;
color:#4caf50;
margin-top:20px;
}
</style>
</head>
<body>

<div class="card">

<div id="lobby">

<h1>🧬 Biology Quiz</h1>

<label>หมวดหมู่</label>
<select id="category">
<option value="reproduction">การสืบพันธุ์ของพืชดอก</option>
<option value="growth">โครงสร้างและการเจริญเติบโตของพืชดอก</option>
<option value="genetics">โครโมโซมและสารพันธุกรรม</option>
<option value="inheritance">การถ่ายทอดลักษณะทางพันธุกรรม</option>
</select>

<label>ระดับ</label>
<select id="difficulty">
<option value="easy">ง่าย</option>
<option value="medium">ปานกลาง</option>
<option value="hard">ยาก</option>
<option value="expert">ยากมาก</option>
</select>

<button onclick="startQuiz()">
เริ่มเกม
</button>

</div>

<div id="quiz" class="hidden">

<div id="progress"></div>

<h2 id="question"></h2>

<div id="answers"></div>

<p id="feedback"></p>

<button id="nextBtn"
class="hidden"
onclick="nextQuestion()">
ข้อถัดไป
</button>

</div>

<div id="result" class="hidden">
<h1>🎉 จบเกม</h1>
<div id="score"></div>
<button onclick="location.reload()">
เล่นใหม่
</button>
</div>

</div>

<script>

const quizData = {

reproduction:{
easy:[
{
q:"ส่วนใดสร้างละอองเรณู",
a:["เกสรตัวผู้","รังไข่","กลีบดอก","ออวุล"],
correct:0
},
{
q:"การผสมเกสรคืออะไร",
a:["ถ่ายละอองเรณู","สร้างเมล็ด","สร้างผล","งอก"],
correct:0
}
]
},

growth:{
easy:[
{
q:"รากมีหน้าที่อะไร",
a:["ดูดน้ำ","สังเคราะห์แสง","สร้างเมล็ด","สร้างดอก"],
correct:0
},
{
q:"ใบมีหน้าที่หลักคือ",
a:["สังเคราะห์แสง","ดูดน้ำ","สร้างราก","สร้างผล"],
correct:0
}
]
},

genetics:{
easy:[
{
q:"DNA ย่อมาจากอะไร",
a:[
"Deoxyribonucleic Acid",
"Ribonucleic Acid",
"ATP",
"Protein"
],
correct:0
},
{
q:"โครโมโซมอยู่ในส่วนใด",
a:[
"นิวเคลียส",
"ผนังเซลล์",
"ไซโทพลาซึม",
"เยื่อหุ้มเซลล์"
],
correct:0
}
]
},

inheritance:{
easy:[
{
q:"เมนเดลศึกษาพืชชนิดใด",
a:[
"ถั่วลันเตา",
"ข้าว",
"ข้าวโพด",
"อ้อย"
],
correct:0
},
{
q:"ลักษณะเด่นคือ",
a:[
"แสดงออกได้",
"หายไป",
"ไม่ถ่ายทอด",
"กลายพันธุ์"
],
correct:0
}
]
}

};

let currentQuiz=[];
let currentIndex=0;
let score=0;

function startQuiz(){

const category =
document.getElementById("category").value;

const difficulty =
document.getElementById("difficulty").value;

if(
!quizData[category] ||
!quizData[category][difficulty]
){
alert("ยังไม่มีคำถามระดับนี้");
return;
}

currentQuiz =
quizData[category][difficulty];

currentIndex=0;
score=0;

document.getElementById("lobby")
.classList.add("hidden");

document.getElementById("quiz")
.classList.remove("hidden");

showQuestion();

}

function showQuestion(){

let q =
currentQuiz[currentIndex];

document.getElementById("progress")
.innerHTML=
`ข้อ ${currentIndex+1}
จาก ${currentQuiz.length}`;

document.getElementById("question")
.innerHTML=q.q;

document.getElementById("feedback")
.innerHTML="";

document.getElementById("nextBtn")
.classList.add("hidden");

let answers=
document.getElementById("answers");

answers.innerHTML="";

q.a.forEach((choice,index)=>{

let div=
document.createElement("div");

div.className="option";

div.innerHTML=choice;

div.onclick=
()=>checkAnswer(index);

answers.appendChild(div);

});

}

function checkAnswer(index){

let q=currentQuiz[currentIndex];

let options=
document.querySelectorAll(".option");

options.forEach(op=>{
op.style.pointerEvents="none";
});

if(index===q.correct){

options[index]
.classList.add("correct");

score++;

document.getElementById("feedback")
.innerHTML=
"✅ ถูกต้อง";

}else{

options[index]
.classList.add("wrong");

options[q.correct]
.classList.add("correct");

document.getElementById("feedback")
.innerHTML=
"❌ คำตอบที่ถูกคือ : "
+ q.a[q.correct];

}

document.getElementById("nextBtn")
.classList.remove("hidden");

}

function nextQuestion(){

currentIndex++;

if(currentIndex<currentQuiz.length){

showQuestion();

}else{

finishQuiz();

}

}

function finishQuiz(){

document.getElementById("quiz")
.classList.add("hidden");

document.getElementById("result")
.classList.remove("hidden");

document.getElementById("score")
.innerHTML=
`คะแนน ${score}
จาก ${currentQuiz.length}`;

}

</script>

</body>
</html>
