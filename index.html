<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เกมชีววิทยา 10 ข้อ</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#4CAF50,#81C784);
    margin:0;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#2e7d32;
}

.level-btn{
    padding:12px 18px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    color:white;
}

.easy{background:#4CAF50;}
.medium{background:#FF9800;}
.hard{background:#F44336;}
.expert{background:#6A1B9A;}

.answer{
    display:block;
    width:100%;
    margin:10px 0;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#f0f0f0;
    cursor:pointer;
    font-size:16px;
}

.answer:hover{
    background:#dcedc8;
}

.hidden{
    display:none;
}

#result{
    text-align:center;
}

.score{
    font-size:24px;
    color:#2e7d32;
}
</style>
</head>
<body>

<div class="container">

<h1>🧬 เกมตอบคำถามชีววิทยา</h1>

<div id="menu">
    <h3>เลือกระดับความยาก</h3>

    <button class="level-btn easy" onclick="startGame('easy')">ง่าย</button>
    <button class="level-btn medium" onclick="startGame('medium')">ปานกลาง</button>
    <button class="level-btn hard" onclick="startGame('hard')">ยาก</button>
    <button class="level-btn expert" onclick="startGame('expert')">ยากมาก</button>
</div>

<div id="quiz" class="hidden">
    <h3 id="progress"></h3>
    <h2 id="question"></h2>

    <div id="answers"></div>
</div>

<div id="result" class="hidden">
    <h2>จบเกม 🎉</h2>
    <p class="score" id="scoreText"></p>
    <button onclick="restart()">เล่นใหม่</button>
</div>

</div>

<script>

{

{

c:0
},
{

}
],

{
q:"เอนไซม์ DNA Polymerase มีหน้าที่",
a:["สังเคราะห์ DNA","สังเคราะห์โปรตีน","สลายไขมัน","สร้าง ATP"],

},
{

},
{

c:0
},
{

},

c:0
},
{
q:"PCR ใช้เพื่ออะไร",
a:["เพิ่มจำนวน DNA","สร้างโปรตีน","สลายเซลล์","ย้อมสีเซลล์"],
c:0
},
{
q:"Lysosome มีหน้าที่",
a:["ย่อยสลายสาร","สร้างพลังงาน","สร้างโปรตีน","สังเคราะห์แสง"],

{

let currentQuestions = [];
let current = 0;
let score = 0;

function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}

function startGame(level){

    currentQuestions=[...questions[level]];
    shuffle(currentQuestions);

    current=0;
    score=0;

    document.getElementById("menu").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");

    showQuestion();
}

function showQuestion(){

    let q=currentQuestions[current];

    document.getElementById("progress").textContent =
        `ข้อ ${current+1} / ${currentQuestions.length}`;

    document.getElementById("question").textContent=q.q;

    const answersDiv=document.getElementById("answers");
    answersDiv.innerHTML="";

    q.a.forEach((ans,index)=>{
        let btn=document.createElement("button");
        btn.className="answer";
        btn.textContent=ans;
        btn.onclick=()=>checkAnswer(index);
        answersDiv.appendChild(btn);
    });
}

function checkAnswer(choice){

    if(choice===currentQuestions[current].c){
        score++;
    }

    current++;

    if(current<currentQuestions.length){
        showQuestion();
    }else{
        finishGame();
    }
}

function finishGame(){
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    document.getElementById("scoreText").textContent =
        `คุณได้ ${score} / ${currentQuestions.length} คะแนน`;
}

function restart(){
    document.getElementById("result").classList.add("hidden");
    document.getElementById("menu").classList.remove("hidden");
}
</script>

</body>
</html>
